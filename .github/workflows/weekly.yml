name: weekly-update

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Build non-FRED data feed
        run: python -m backend.app.data_builder
      - name: Run pipeline
        run: python -m backend.app.main
      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/latest.json data/history.json backend/data/raw/data_feed.csv
          git diff --cached --quiet || git commit -m "Atualiza dados do dashboard"
          git push
