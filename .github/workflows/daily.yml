name: daily-update

on:
  schedule:
    # Roda de segunda a sexta às 13h UTC (10h EST / 9h CST)
    # — após abertura dos mercados americanos e publicação
    #   das séries FRED do dia anterior (tipicamente às 8h30 EST)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Build non-FRED data feed
        run: python -m backend.app.data_builder

      - name: Run pipeline
        run: python -m backend.app.main

      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add frontend/data/latest.json frontend/data/history.json backend/data/raw/data_feed.csv
          git diff --cached --quiet || git commit -m "Atualiza dados do dashboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push