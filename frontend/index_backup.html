<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Bayesiano de Liquidez</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero card">
        <div>
          <h1>Dashboard Bayesiano de Risco de Liquidez</h1>
          <p>Frontend estático consumindo <code>frontend/data/latest.json</code> e <code>frontend/data/history.json</code>.</p>
        </div>
        <div class="meta">
          <div><span>Execução</span><strong id="run-date">-</strong></div>
          <div><span>Classificação</span><strong id="risk-label">-</strong></div>
        </div>
      </header>

      <section class="summary-grid">
        <article class="card dark">
          <span>Probabilidade posterior</span>
          <strong id="posterior">-</strong>
        </article>
        <article class="card">
          <span>Prior</span>
          <strong id="prior">-</strong>
        </article>
        <article class="card">
          <span>Bloco externo</span>
          <strong id="external-status">-</strong>
        </article>
        <article class="card">
          <span>Fonte / status</span>
          <strong id="source-status">-</strong>
        </article>
      </section>

      <section class="grid-two">
        <article class="card">
          <h2>Sinais do modelo</h2>
          <div id="signals"></div>
        </article>
        <article class="card">
          <h2>Histórico</h2>
          <canvas id="history-chart" width="560" height="320"></canvas>
          <div id="history-table"></div>
        </article>
      </section>

      <section class="grid-two">
        <article class="card">
          <h2>Bloco externo</h2>
          <div id="external-block"></div>
        </article>
        <article class="card">
          <h2>Dados brutos</h2>
          <div id="raw-data"></div>
        </article>
      </section>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
